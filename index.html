// ── SIGNAL COLORS ────────────────────────────────────────────
const SIG_COLOR = { STRONG_BUY:"#00ff88", BUY:"#4ade80", HOLD:"#facc15", SELL:"#f87171", STRONG_SELL:"#ef4444" };
const SIG_BG    = { STRONG_BUY:"rgba(0,255,136,0.08)", BUY:"rgba(74,222,128,0.06)", HOLD:"rgba(250,204,21,0.06)", SELL:"rgba(248,113,113,0.06)", STRONG_SELL:"rgba(239,68,68,0.08)" };

// ── HELPERS ──────────────────────────────────────────────────
function fmt(p) {
  if (!p && p !== 0) return "—";
  if (p >= 1000) return p.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (p >= 1) return p.toFixed(4);
  return p.toFixed(8);
}

function fmtVol(v) {
  if (v >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  return `$${(v/1e3).toFixed(0)}K`;
}

function calcSignal(change, volSpike, pricePos) {
  if (change > 8 && volSpike > 3)   return "STRONG_BUY";
  if (change > 4 && volSpike > 2)   return "BUY";
  if (change > 2 && volSpike > 2.5) return "BUY";
  if (change < -8 && volSpike > 3)  return "STRONG_SELL";
  if (change < -4 && volSpike > 2)  return "SELL";
  if (change < -2)                  return "SELL";
  return "HOLD";
}

// ── SPARKLINE ────────────────────────────────────────────────
function Spark({ data, color }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*80},${26-((v-min)/range)*24}`).join(" ");
  return (
    <svg width={80} height={28}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

// ── VOLUME SPIKE BAR ─────────────────────────────────────────
function SpikeBar({ value }) {
  const capped = Math.min(value, 10);
  const pct = (capped / 10) * 100;
  const col = value >= 5 ? "#ef4444" : value >= 3 ? "#fb923c" : value >= 2 ? "#facc15" : "#4ade80";
  return (
    <div style={{ position:"relative" }}>
      <div style={{ height:4, background:"#0f1a2e", borderRadius:2 }}>
        <div style={{ height:"100%", width:`${pct}%`, background:col, borderRadius:2, transition:"width 0.6s" }}/>
      </div>
      <div style={{ fontSize:9, color:col, fontFamily:"'Space Mono',monospace", marginTop:2 }}>
        {value.toFixed(1)}x {value >= 5 ? "🔥🔥" : value >= 3 ? "🔥" : ""}
      </div>
    </div>
  );
}

      });
      const data = await res.json();
      const raw = data.content?.find(b=>b.type==="text")?.text||"{}";
      setGlobalPred(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { console.error(e); }
    finally { setLoadingGlobal(false); }
  };

  // ── Filter & Sort ─────────────────────────────────────────
  const displayed = movers
    .filter(c => {
      if (c.volSpike < minSpike) return false;
      if (Math.abs(c.change24h) < minChange) return false;
      if (filter==="BUY")  return c.signal==="BUY"||c.signal==="STRONG_BUY";
      if (filter==="SELL") return c.signal==="SELL"||c.signal==="STRONG_SELL";
      if (filter==="SPIKE") return c.volSpike >= 3;
      return true;
    })
    .sort((a,b) => {
      if (sortBy==="spike")  return b.volSpike - a.volSpike;
      if (sortBy==="change") return Math.abs(b.change24h) - Math.abs(a.change24h);
      if (sortBy==="volume") return b.volume24h - a.volume24h;
      if (sortBy==="signal") { const o={STRONG_BUY:0,BUY:1,HOLD:2,SELL:3,STRONG_SELL:4}; return (o[a.signal]??2)-(o[b.signal]??2); }
      return 0;
    })
    .slice(0, 60); // show top 60

  const stats = {
    buy:  movers.filter(c=>c.volSpike>=minSpike&&(c.signal==="BUY"||c.signal==="STRONG_BUY")).length,
    hold: movers.filter(c=>c.volSpike>=minSpike&&c.signal==="HOLD").length,
    sell: movers.filter(c=>c.volSpike>=minSpike&&(c.signal==="SELL"||c.signal==="STRONG_SELL")).length,
    spike: movers.filter(c=>c.volSpike>=3).length,
  };
  const sentCol = {BULLISH:"#00ff88",BEARISH:"#f87171",NEUTRAL:"#facc15",VOLATILE:"#fb923c"};
  const fngColor = fng?(fng.value>=60?"#00ff88":fng.value>=40?"#facc15":"#f87171"):"#334155";

  return (
    <div style={{ minHeight:"100vh", background:"#060810", fontFamily:"'DM Sans',sans-serif", color:"#e2e8f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0c14}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:4px}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      `}</style>

      {/* ── HEADER ── */}
      <div style={{ background:"linear-gradient(180deg,#080f1e,#060810)", borderBottom:"1px solid #0d1526", padding:"14px 20px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:1400, margin:"0 auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>

            {/* Brand + scan info */}
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg,#00ff88,#00b4ff)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:13, color:"#060810" }}>◈</div>
                <span style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:17, letterSpacing:2.5, color:"#e2e8f0" }}>CRYPTEX</span>
                <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#00b4ff", letterSpacing:1.5, background:"rgba(0,180,255,0.08)", padding:"2px 8px", borderRadius:4, border:"1px solid rgba(0,180,255,0.18)" }}>EARLY MOVER</span>
              </div>
              <div style={{ display:"flex", gap:10, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:sources.binance?"#475569":"#1e2535", fontFamily:"'Space Mono',monospace" }}>
                  <span style={{ width:5, height:5, borderRadius:"50%", background:sources.binance?"#00ff88":"#1e2535", display:"inline-block", animation:sources.binance?"blink 2s infinite":"none" }}/>
                  {scanning ? `SCANNING ${totalScanned} PAIRS...` : `${totalScanned} PAIRS SCANNED`}
                </div>
                {[["fng","Fear&Greed"],["news","News"]].map(([k,l])=>(
                  <div key={k} style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:sources[k]?"#475569":"#1e2535", fontFamily:"'Space Mono',monospace" }}>
                    <span style={{ width:5, height:5, borderRadius:"50%", background:sources[k]?"#00ff88":"#1e2535", display:"inline-block", animation:sources[k]?"blink 2s infinite":"none" }}/>
                    {l}
                  </div>
                ))}
                {lastScan && <span style={{ fontSize:9, color:"#1e2535", fontFamily:"'Space Mono',monospace" }}>· {lastScan.toLocaleTimeString()} · ↺90s</span>}
              </div>
            </div>

            {/* Stats */}
            <div style={{ display:"flex", gap:16, alignItems:"center" }}>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontFamily:"'Space Mono',monospace", fontSize:18, fontWeight:700, color:"#fb923c" }}>{stats.spike}</div>
                <div style={{ fontSize:8, color:"#1e2535", letterSpacing:1 }}>🔥 SPIKES</div>
              </div>
              {[["BUY",stats.buy,"#00ff88"],["HOLD",stats.hold,"#facc15"],["SELL",stats.sell,"#f87171"]].map(([l,v,c])=>(
                <div key={l} style={{ textAlign:"center" }}>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:18, fontWeight:700, color:c }}>{v}</div>
                  <div style={{ fontSize:8, color:"#1e2535", letterSpacing:1 }}>{l}</div>
                </div>
              ))}
              {fng && (
                <div style={{ textAlign:"center", background:"rgba(0,0,0,0.3)", border:`1px solid ${fngColor}22`, borderRadius:8, padding:"5px 12px" }}>
                  <div style={{ fontSize:8, color:"#334155", letterSpacing:1, fontFamily:"'Space Mono',monospace" }}>F&G</div>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:16, fontWeight:700, color:fngColor }}>{fng.value}</div>
                  <div style={{ fontSize:8, color:fngColor }}>{fng.label.toUpperCase()}</div>
                </div>
              )}
            </div>

            {/* Buttons */}
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={fetchAll} disabled={scanning} style={{ padding:"7px 14px", borderRadius:7, background:"rgba(255,255,255,0.03)", border:"1px solid #1a2535", color:"#475569", fontSize:10, fontWeight:600, cursor:"pointer", letterSpacing:1, fontFamily:"'Space Mono',monospace" }}>
                {scanning?"⟳ SCANNING":"↺ RESCAN"}
              </button>
              <button onClick={analyzeAll} disabled={loadingGlobal||loading||movers.length===0} style={{ padding:"7px 16px", borderRadius:7, background:"linear-gradient(135deg,rgba(0,255,136,0.12),rgba(0,180,255,0.08))", border:"1px solid rgba(0,255,136,0.25)", color:"#00ff88", fontSize:10, fontWeight:700, cursor:"pointer", letterSpacing:1.5, fontFamily:"'Space Mono',monospace" }}>
                {loadingGlobal?"⟳ SCANNING...":"⚡ AI SCAN ALL"}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:1400, margin:"0 auto", padding:"16px 14px" }}>

        {/* ── GLOBAL PREDICTION ── */}
        {globalPred && (
          <div style={{ background:"rgba(8,12,22,0.97)", border:`1px solid ${sentCol[globalPred.marketSentiment]||"#1e2535"}28`, borderRadius:14, padding:"16px 20px", marginBottom:18, borderLeft:`3px solid ${sentCol[globalPred.marketSentiment]||"#334155"}`, animation:"fadeUp 0.4s ease" }}>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:14 }}>
              <div style={{ flex:1, minWidth:220 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, letterSpacing:2, color:"#334155" }}>AI MARKET SCAN · {totalScanned} PAIRS</span>
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:10, fontWeight:700, color:sentCol[globalPred.marketSentiment], background:(sentCol[globalPred.marketSentiment]||"#fff")+"12", padding:"2px 10px", borderRadius:4, border:`1px solid ${sentCol[globalPred.marketSentiment]||"#fff"}28` }}>{globalPred.marketSentiment}</span>
                  {globalPred.newsTheme && <span style={{ fontSize:9, color:"#fb923c", fontFamily:"'Space Mono',monospace", background:"rgba(251,146,60,0.08)", padding:"2px 8px", borderRadius:4 }}>📰 {globalPred.newsTheme}</span>}
                </div>
                <p style={{ fontSize:13, color:"#8899aa", lineHeight:1.7, marginBottom:8 }}>{globalPred.overview}</p>
                {globalPred.fakePumps  && <div style={{ fontSize:11, color:"#fb923c", marginBottom:4 }}>⚠ Fake pumps: {globalPred.fakePumps}</div>}
                {globalPred.avoidToday && <div style={{ fontSize:11, color:"#f87171", marginBottom:4 }}>🚫 Avoid: {globalPred.avoidToday}</div>}
                {globalPred.warning    && <div style={{ fontSize:11, color:"#f87171", marginBottom:4 }}>⚠ {globalPred.warning}</div>}
                {globalPred.bestWindow && <div style={{ fontSize:11, color:"#00b4ff" }}>⏰ {globalPred.bestWindow}</div>}
              </div>
              {globalPred.topPicks && (
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  {globalPred.topPicks.map((p,i)=>(
                    <div key={i} style={{ background:"rgba(0,255,136,0.05)", border:"1px solid rgba(0,255,136,0.12)", borderRadius:10, padding:"10px 14px", minWidth:110 }}>
                      <div style={{ fontSize:8, color:"#334155", letterSpacing:1, marginBottom:3, fontFamily:"'Space Mono',monospace" }}>#{i+1} PICK</div>
                      <div style={{ fontFamily:"'Space Mono',monospace", color:"#00ff88", fontWeight:700, fontSize:14, marginBottom:4 }}>{p.symbol}</div>
                      <div style={{ fontSize:9, color:"#475569", marginBottom:5, lineHeight:1.5 }}>{p.reason}</div>
                      {p.entry  && <div style={{ fontSize:9, fontFamily:"'Space Mono',monospace" }}><span style={{ color:"#334155" }}>IN </span><span style={{ color:"#00ff88" }}>{p.entry}</span></div>}
                      {p.target && <div style={{ fontSize:9, fontFamily:"'Space Mono',monospace" }}><span style={{ color:"#334155" }}>TP </span><span style={{ color:"#4ade80" }}>{p.target}</span></div>}
                      {p.stop   && <div style={{ fontSize:9, fontFamily:"'Space Mono',monospace" }}><span style={{ color:"#334155" }}>SL </span><span style={{ color:"#f87171" }}>{p.stop}</span></div>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── TABS ── */}
        <div style={{ display:"flex", gap:4, marginBottom:14, borderBottom:"1px solid #0d1526", paddingBottom:10, flexWrap:"wrap" }}>
          {[["movers","⚡ Early Movers"],["news","📰 News"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{ padding:"6px 16px", borderRadius:6, background:tab===t?"rgba(0,255,136,0.08)":"transparent", border:`1px solid ${tab===t?"rgba(0,255,136,0.2)":"transparent"}`, color:tab===t?"#00ff88":"#334155", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"'Space Mono',monospace", letterSpacing:1 }}>
              {l}
            </button>
          ))}

          {/* Filters */}
          {tab==="movers" && (
            <div style={{ display:"flex", gap:6, marginLeft:"auto", alignItems:"center", flexWrap:"wrap" }}>
              {[["ALL","#64748b"],["SPIKE","#fb923c"],["BUY","#00ff88"],["SELL","#f87171"]].map(([f,c])=>(
                <button key={f} onClick={()=>setFilter(f)} style={{ padding:"4px 12px", borderRadius:5, background:filter===f?c+"12":"rgba(255,255,255,0.02)", border:`1px solid ${filter===f?c+"40":"#0f1a2e"}`, color:filter===f?c:"#334155", fontSize:9, fontWeight:700, cursor:"pointer", letterSpacing:1.5, fontFamily:"'Space Mono',monospace" }}>{f}</button>
              ))}
              <div style={{ width:1, height:14, background:"#0f1a2e" }}/>
              {[["spike","VOL SPIKE"],["change","% MOVE"],["volume","VOLUME"]].map(([s,l])=>(
                <button key={s} onClick={()=>setSortBy(s)} style={{ padding:"4px 10px", borderRadius:5, background:sortBy===s?"rgba(0,255,136,0.07)":"rgba(255,255,255,0.02)", border:`1px solid ${sortBy===s?"rgba(0,255,136,0.2)":"#0f1a2e"}`, color:sortBy===s?"#00ff88":"#334155", fontSize:9, fontWeight:700, cursor:"pointer", fontFamily:"'Space Mono',monospace" }}>{l}</button>
              ))}
              <div style={{ width:1, height:14, background:"#0f1a2e" }}/>
              {/* Min spike filter */}
              <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                <span style={{ fontSize:9, color:"#334155", fontFamily:"'Space Mono',monospace" }}>MIN SPIKE</span>
                {[1.5, 2, 3, 5].map(v=>(
                  <button key={v} onClick={()=>setMinSpike(v)} style={{ padding:"3px 8px", borderRadius:4, background:minSpike===v?"rgba(251,146,60,0.12)":"rgba(255,255,255,0.02)", border:`1px solid ${minSpike===v?"rgba(251,146,60,0.4)":"#0f1a2e"}`, color:minSpike===v?"#fb923c":"#334155", fontSize:9, cursor:"pointer", fontFamily:"'Space Mono',monospace" }}>{v}x</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* ── DISCLAIMER ── */}
        <div style={{ background:"rgba(251,146,60,0.04)", border:"1px solid rgba(251,146,60,0.10)", borderRadius:8, padding:"6px 14px", marginBottom:16, fontSize:10, color:"#57534e", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ color:"#fb923c" }}>⚠</span> Day trading is high risk. AI signals are educational only. Always use stop losses. Never risk more than you can afford to lose.
        </div>

        {/* ── MOVERS TAB ── */}
        {tab==="movers" && (
          <>
            {loading && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:14 }}>
                {Array(12).fill(0).map((_,i)=>(
                  <div key={i} style={{ height:220, borderRadius:16, background:"#0f1628", animation:"blink 1.5s infinite", animationDelay:`${i*60}ms` }}/>
                ))}
              </div>
            )}
            {!loading && (
              <>
                <div style={{ fontSize:10, color:"#1e3a5f", fontFamily:"'Space Mono',monospace", marginBottom:12, letterSpacing:1 }}>
                  SHOWING {displayed.length} MOVERS · MIN {minSpike}x VOL SPIKE · SORTED BY {sortBy.toUpperCase()}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))", gap:14 }}>
                  {displayed.map(coin=>(
                    <MoverCard key={coin.symbol} coin={coin} onAnalyze={analyzeOne} analyzing={analyzing}/>
                  ))}
                </div>
                {displayed.length===0 && (
                  <div style={{ textAlign:"center", padding:"60px 20px", color:"#1e2535" }}>
                    <div style={{ fontSize:36, marginBottom:12 }}>◌</div>
                    <div style={{ fontFamily:"'Space Mono',monospace", letterSpacing:2, fontSize:11 }}>NO COINS MATCH — TRY LOWERING MIN SPIKE</div>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* ── NEWS TAB ── */}
        {tab==="news" && (
          <div style={{ maxWidth:700 }}>
            {news.length===0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px", color:"#334155" }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📰</div>
                <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, letterSpacing:1 }}>NEWS LOADS ON GITHUB PAGES</div>
              </div>
            ) : (
              <>
                <div style={{ fontSize:9, color:"#334155", fontFamily:"'Space Mono',monospace", letterSpacing:1.5, marginBottom:12 }}>LATEST NEWS · {news.length} ARTICLES · USED IN AI ANALYSIS</div>
                {news.map((n,i)=><NewsItem key={i} item={n}/>)}
              </>
            )}
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:40, padding:"14px 0", borderTop:"1px solid #0a1020" }}>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:8, color:"#0f1628", letterSpacing:3 }}>
            CRYPTEX EARLY MOVER · BINANCE {totalScanned} PAIRS · FEAR&GREED · NEWS · AI POWERED · NOT FINANCIAL ADVICE
          </div>
        </div>
      </div>
    </div>
  );
}


    // Mount app
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(<CryptoAdvisor />);
    document.getElementById("loading").style.display = "none";
  </script>
</body>
</html>
