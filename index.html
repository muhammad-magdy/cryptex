<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRYPTEX — AI Early Mover Advisor</title>
  <meta name="description" content="AI-powered crypto day trading advisor — scans 300+ Binance pairs for volume spikes and early movers"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>"/>
  <script type="importmap">
  {
    "imports": {
      "react":     "https://esm.sh/react@18",
      "react-dom": "https://esm.sh/react-dom@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060810; color: #e2e8f0; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #060810;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      font-family: 'Space Mono', monospace;
    }
    #loading .logo { font-size: 48px; animation: pulse 1.5s infinite; }
    #loading .text { color: #00ff88; letter-spacing: 3px; font-size: 13px; }
    #loading .sub  { color: #1e3a5f; font-size: 10px; letter-spacing: 2px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="loading">
    <div class="logo">◈</div>
    <div class="text">CRYPTEX AI</div>
    <div class="sub">SCANNING MARKETS...</div>
  </div>
  <div id="root"></div>
  <script type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";
    import App from "./crypto-advisor.jsx";
    document.getElementById("loading").style.display = "none";
    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
