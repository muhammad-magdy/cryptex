// ── PAPER TRADING STORAGE ────────────────────────────────────
const STORAGE_KEY = "cryptex_trades_v1";

function loadTrades() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
  catch(e) { return []; }
}
function saveTrades(trades) {

// Volume spike threshold — coin's volume must be X times its "normal" to alert
const VOL_SPIKE_THRESHOLD = 2.5;
// Minimum 24h volume in USD to consider (filter out dust)
const MIN_VOLUME_USD = 500000;

// ── SIGNAL COLORS ────────────────────────────────────────────
const SIG_COLOR = { STRONG_BUY:"#00ff88", BUY:"#4ade80", HOLD:"#facc15", SELL:"#f87171", STRONG_SELL:"#ef4444" };
const SIG_BG    = { STRONG_BUY:"rgba(0,255,136,0.08)", BUY:"rgba(74,222,128,0.06)", HOLD:"rgba(250,204,21,0.06)", SELL:"rgba(248,113,113,0.06)", STRONG_SELL:"rgba(239,68,68,0.08)" };

// ── HELPERS ──────────────────────────────────────────────────
function fmt(p) {
  if (!p && p !== 0) return "—";
  if (p >= 1000) return p.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (p >= 1) return p.toFixed(4);
  return p.toFixed(8);
}

function fmtVol(v) {
  if (v >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
  if (v >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  return `$${(v/1e3).toFixed(0)}K`;
}

function calcSignal(change, volSpike, pricePos) {
  if (change > 8 && volSpike > 3)   return "STRONG_BUY";
  if (change > 4 && volSpike > 2)   return "BUY";
  if (change > 2 && volSpike > 2.5) return "BUY";
  if (change < -8 && volSpike > 3)  return "STRONG_SELL";
  if (change < -4 && volSpike > 2)  return "SELL";
  if (change < -2)                  return "SELL";
  return "HOLD";
}

// Trade Quality Score — combines all metrics into letter grade
function calcGrade(coin) {
  let pts = 0;
  const reasons = []; // {label, points, value} breakdown
  const { volSpike, dayPos, momentum, change24h, volume24h, dayRange } = coin;
  const absChange = Math.abs(change24h);
  const range = parseFloat(dayRange);

  // ─── Volume Spike ───
  if (volSpike >= 10)      { pts += 4; reasons.push({label:"Volume Spike", points:+4, detail:`${volSpike.toFixed(1)}x — massive interest`}); }
  else if (volSpike >= 5)  { pts += 3; reasons.push({label:"Volume Spike", points:+3, detail:`${volSpike.toFixed(1)}x — very strong`}); }
  else if (volSpike >= 3)  { pts += 2; reasons.push({label:"Volume Spike", points:+2, detail:`${volSpike.toFixed(1)}x — strong`}); }
  else if (volSpike >= 2)  { pts += 1; reasons.push({label:"Volume Spike", points:+1, detail:`${volSpike.toFixed(1)}x — above average`}); }
  else                     { reasons.push({label:"Volume Spike", points:0, detail:`${volSpike.toFixed(1)}x — normal volume`}); }

  // ─── Day Position ───
  if (dayPos >= 85)                           { pts -= 4; reasons.push({label:"Day Position", points:-4, detail:`${dayPos}% — CHASING THE TOP ⚠️`}); }
  else if (dayPos >= 70)                      { pts -= 1; reasons.push({label:"Day Position", points:-1, detail:`${dayPos}% — late entry`}); }
  else if (dayPos >= 20 && dayPos <= 60)      { pts += 3; reasons.push({label:"Day Position", points:+3, detail:`${dayPos}% — sweet spot ✓`}); }
  else if (dayPos < 20)                       { pts += 2; reasons.push({label:"Day Position", points:+2, detail:`${dayPos}% — oversold bounce zone`}); }
  else                                        { reasons.push({label:"Day Position", points:0, detail:`${dayPos}% — neutral`}); }

  // ─── Momentum / Exhaustion ───
  if (momentum >= 95 && absChange >= 40)      { pts -= 3; reasons.push({label:"Momentum", points:-3, detail:`${momentum} + ${absChange.toFixed(0)}% — parabolic exhaustion ⚠️`}); }
  else if (momentum >= 60 && momentum <= 85)  { pts += 2; reasons.push({label:"Momentum", points:+2, detail:`${momentum} — strong & healthy`}); }
  else if (momentum >= 85)                    { reasons.push({label:"Momentum", points:0, detail:`${momentum} — maxed out`}); }
  else if (momentum <= 15)                    { pts += 1; reasons.push({label:"Momentum", points:+1, detail:`${momentum} — oversold`}); }
  else                                        { reasons.push({label:"Momentum", points:0, detail:`${momentum} — neutral`}); }

  // ─── Change Quality ───
  if (absChange >= 5 && absChange <= 25)      { pts += 2; reasons.push({label:"% Change", points:+2, detail:`${change24h.toFixed(1)}% — real move`}); }
  else if (absChange > 50)                    { pts -= 2; reasons.push({label:"% Change", points:-2, detail:`${change24h.toFixed(1)}% — parabolic ⚠️`}); }
  else if (absChange < 2)                     { pts -= 1; reasons.push({label:"% Change", points:-1, detail:`${change24h.toFixed(1)}% — barely moving`}); }
  else                                        { reasons.push({label:"% Change", points:0, detail:`${change24h.toFixed(1)}% — moderate`}); }

  // ─── Liquidity ───
  if (volume24h >= 50e6)                      { pts += 2; reasons.push({label:"Liquidity", points:+2, detail:`$${(volume24h/1e6).toFixed(0)}M — deep liquidity`}); }
  else if (volume24h >= 10e6)                 { pts += 1; reasons.push({label:"Liquidity", points:+1, detail:`$${(volume24h/1e6).toFixed(0)}M — good liquidity`}); }
  else if (volume24h < 1e6)                   { pts -= 2; reasons.push({label:"Liquidity", points:-2, detail:`$${(volume24h/1e3).toFixed(0)}K — manipulation risk ⚠️`}); }
  else                                        { reasons.push({label:"Liquidity", points:0, detail:`$${(volume24h/1e6).toFixed(1)}M — moderate`}); }

  // ─── Range / Volatility ───
  if (range > 60)                             { pts -= 1; reasons.push({label:"Volatility", points:-1, detail:`${range.toFixed(0)}% range — very wild`}); }
  else if (range >= 5 && range <= 30)         { pts += 1; reasons.push({label:"Volatility", points:+1, detail:`${range.toFixed(0)}% range — tradeable`}); }
  else                                        { reasons.push({label:"Volatility", points:0, detail:`${range.toFixed(1)}% range`}); }

  // Convert to grade
  let grade, color;
  if (pts >= 9)      { grade = "A+"; color = "#00ff88"; }
  else if (pts >= 7) { grade = "A";  color = "#4ade80"; }
  else if (pts >= 5) { grade = "B";  color = "#facc15"; }
  else if (pts >= 3) { grade = "C";  color = "#fb923c"; }
  else if (pts >= 1) { grade = "D";  color = "#f87171"; }
  else               { grade = "F";  color = "#ef4444"; }

  return { grade, score: pts, color, reasons };
}

// ── SPARKLINE ────────────────────────────────────────────────
function Spark({ data, color }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*80},${26-((v-min)/range)*24}`).join(" ");
  return (
    <svg width={80} height={28}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

// ── VOLUME SPIKE BAR ─────────────────────────────────────────
function SpikeBar({ value }) {
  const capped = Math.min(value, 10);
  const pct = (capped / 10) * 100;
  const col = value >= 5 ? "#ef4444" : value >= 3 ? "#fb923c" : value >= 2 ? "#facc15" : "#4ade80";
  return (
    <div style={{ position:"relative" }}>
      <div style={{ height:4, background:"#0f1a2e", borderRadius:2 }}>
        <div style={{ height:"100%", width:`${pct}%`, background:col, borderRadius:2, transition:"width 0.6s" }}/>
      </div>
      <div style={{ fontSize:9, color:col, fontFamily:"'Space Mono',monospace", marginTop:2 }}>
        {value.toFixed(1)}x {value >= 5 ? "🔥🔥" : value >= 3 ? "🔥" : ""}
      </div>
    </div>
  );
}

// ── EARLY MOVER CARD ─────────────────────────────────────────
function MoverCard({ coin, onAnalyze, analyzing, onTrade, myTrade, onCloseTrade }) {
  const isPos = coin.change24h >= 0;
  const col = SIG_COLOR[coin.signal];
  const isAlert = coin.volSpike >= VOL_SPIKE_THRESHOLD;

      {/* Alert banner for spike coins */}
      {isAlert && (

      {/* Header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8, position:"relative" }}>

  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function CryptoAdvisor() {
  const [allTickers, setAllTickers]   = useState([]); // raw Binance data for ALL pairs
  const [movers, setMovers]           = useState([]); // processed early movers
  const [loading, setLoading]         = useState(true);
  const [scanning, setScanning]       = useState(false);
  const [lastScan, setLastScan]       = useState(null);
  const [fng, setFng]                 = useState(null);
  const [news, setNews]               = useState([]);
  const [analyzing, setAnalyzing]     = useState(null);
  const [globalPred, setGlobalPred]   = useState(null);
  const [loadingGlobal, setLoadingGlobal] = useState(false);
  const [tab, setTab]                 = useState("movers"); // movers | trades | news
  const [trades, setTrades]           = useState(() => loadTrades());
  const [tradeModal, setTradeModal]   = useState(null); // {coin} when add-trade modal is open
  const [filter, setFilter]           = useState("ALL");
  const [sortBy, setSortBy]           = useState("grade");
  const [minSpike, setMinSpike]       = useState(2.0);
  const [minChange, setMinChange]     = useState(0);
  const [sources, setSources]         = useState({ binance:false, fng:false, news:false });
  const [totalScanned, setTotalScanned] = useState(0);
  const [binanceErr, setBinanceErr]   = useState(null);
  const [dataSource, setDataSource]   = useState("Binance");

  // ── Process Binance tickers into early movers ──────────────
  const processMovers = useCallback((tickers) => {
    if (!tickers.length) return [];

    // Calculate median volume to detect spikes
    const volumes = tickers.filter(t=>t&&t.quoteVolume).map(t => parseFloat(t.quoteVolume)).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
    const medianVol = volumes[Math.floor(volumes.length/2)];

    return tickers
      .filter(t => {
        if (!t || !t.symbol || !t.lastPrice || !t.quoteVolume) return false;
        const vol = parseFloat(t.quoteVolume);
        const price = parseFloat(t.lastPrice);
        return vol >= MIN_VOLUME_USD && price > 0 && t.symbol.endsWith("USDT");
      })
      .map(t => {
        const price    = parseFloat(t.lastPrice);
        const change   = parseFloat(t.priceChangePercent);
        const high     = parseFloat(t.highPrice);
        const low      = parseFloat(t.lowPrice);
        const vol      = parseFloat(t.quoteVolume);
        const range    = high - low || 1;
        const dayPos   = Math.round(((price - low) / range) * 100);
        const dayRange = ((range / low) * 100).toFixed(2);
        const volSpike = parseFloat((vol / (medianVol || 1)).toFixed(2));
        const momentum = Math.min(100, Math.max(0, Math.round(50 + change * 4)));
        const stopLoss = parseFloat((change >= 0 ? price - range * 0.4 : price + range * 0.4).toFixed(price>1?4:8));
        const sig      = calcSignal(change, volSpike, dayPos);

        // Build a fake sparkline from open/close/high/low
        const open = parseFloat(t.openPrice);
        const spark = Array.from({length:20}, (_,i) => {
          const progress = i/19;
          return open + (price - open)*progress + (Math.sin(i*0.8)*range*0.15);
        });

        const baseCoin = {
          symbol:   t.symbol,
          name:     t.symbol.replace("USDT",""),
          price, change24h:change, high, low, volume24h:vol,
          dayPos, dayRange, volSpike, momentum, stopLoss,
          signal:sig, sparkline:spark,
        };
        const gradeInfo = calcGrade(baseCoin);
        return { ...baseCoin, grade: gradeInfo.grade, gradeScore: gradeInfo.score, gradeColor: gradeInfo.color, gradeReasons: gradeInfo.reasons };
      });
  }, []);

  // ── Try Binance with multiple endpoints ───────────────────
  const fetchWithTimeout = (url, ms) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
  };

  const fetchBinanceTickers = useCallback(async () => {
    // Try each Binance endpoint
    for (const endpoint of BINANCE_ENDPOINTS) {
      try {
        const res = await fetchWithTimeout(`${endpoint}/ticker/24hr`, 8000);
        if (!res.ok) continue;
        const raw = await res.json();
        if (raw && raw.code) continue;
        const arr = Array.isArray(raw) ? raw : (raw && Array.isArray(raw.data) ? raw.data : null);
        if (arr && arr.length > 0) return { data: arr, source: "Binance" };
      } catch(e) { console.warn("Binance endpoint failed:", endpoint, e.message); continue; }
    }
    // Fall back to CoinGecko
    console.log("Binance blocked, falling back to CoinGecko...");
    try {
      const res = await fetchWithTimeout(CG_MARKETS_URL, 10000);
      if (!res.ok) throw new Error("CoinGecko HTTP " + res.status);
      const cgData = await res.json();
      if (!Array.isArray(cgData)) throw new Error("CoinGecko returned non-array");
      const converted = cgData.map(c => ({
        symbol: (c.symbol || "").toUpperCase() + "USDT",
        lastPrice: String(c.current_price || 0),
        priceChangePercent: String(c.price_change_percentage_24h || 0),
        highPrice: String(c.high_24h || c.current_price * 1.03 || 0),
        lowPrice: String(c.low_24h || c.current_price * 0.97 || 0),
        quoteVolume: String(c.total_volume || 0),
        openPrice: String((c.current_price || 0) * (1 - (c.price_change_percentage_24h||0)/100)),
      }));
      return { data: converted, source: "CoinGecko" };
    } catch(e) {
      console.error("CoinGecko fallback failed:", e.message);
    }
    return null;
  }, []);

  // ── Fetch everything ──────────────────────────────────────
  const fetchAll = useCallback(async () => {
    setScanning(true);
    const newSources = { binance:false, fng:false, news:false };

    console.log("[CRYPTEX] Starting fetch cycle...");

    const [tickerResult, fngRes, newsRes] = await Promise.allSettled([
      fetchBinanceTickers().catch(e => { console.error("[CRYPTEX] fetchBinanceTickers threw:", e); return null; }),
      fetch(FNG_URL).then(r=>r.json()).catch(e => { console.warn("[CRYPTEX] FNG failed:", e.message); return null; }),
      fetch(NEWS_URL).then(r=>r.json()).catch(e => { console.warn("[CRYPTEX] News failed:", e.message); return null; }),
    ]);

    console.log("[CRYPTEX] Ticker result:", tickerResult);
    console.log("[CRYPTEX] FNG result:", fngRes);
    console.log("[CRYPTEX] News result:", newsRes);

    if (tickerResult.status==="fulfilled" && tickerResult.value) {
      const { data: tickerArray, source } = tickerResult.value;
      newSources.binance = true;
      setBinanceErr(null);
      const usdtPairs = tickerArray.filter(t=>t && t.symbol && t.symbol.endsWith("USDT"));
      setAllTickers(usdtPairs);
      setTotalScanned(usdtPairs.length);
      const processed = processMovers(usdtPairs);
      setMovers(processed);
      setDataSource(source);
    } else {
      setBinanceErr("All price sources failed. Check your internet connection and try again.");
    }

    if (fngRes.status==="fulfilled" && fngRes.value && fngRes.value.data && fngRes.value.data[0]) {
      newSources.fng = true;
      setFng({ value: parseInt(fngRes.value.data[0].value), label: fngRes.value.data[0].value_classification });
    }

    if (newsRes.status==="fulfilled" && newsRes.value && Array.isArray(newsRes.value.Data)) {
      newSources.news = true;
      const items = newsRes.value.Data.map(n => {
        const t = (n.title+" "+n.body).toLowerCase();
        const pos = ["surge","rally","bull","gain","rise","soar","pump","ath","breakout","adoption","partnership"].some(w=>t.includes(w));
        const neg = ["crash","drop","bear","fall","dump","hack","ban","fear","sell","liquidat","exploit"].some(w=>t.includes(w));
        return { title:n.title, url:n.url, source:n.source_info?.name||n.source, published_on:n.published_on, sentiment:pos?"positive":neg?"negative":"neutral" };
      });
      setNews(items);
    }

    setSources(newSources);
    setLastScan(new Date());
    setLoading(false);
    setScanning(false);
  }, [processMovers, fetchBinanceTickers]);

  useEffect(() => { fetchAll(); }, [fetchAll]);
  useEffect(() => { saveTrades(trades); }, [trades]);
  useEffect(() => {
    const t = setInterval(fetchAll, 90000); // re-scan every 90 seconds
    return () => clearInterval(t);
  }, [fetchAll]);

  // ── Open a paper trade ────────────────────────────────────
  const openTrade = (coin, amountEur) => {
    const tokens = amountEur / coin.price;
    const newTrade = {
      id: Date.now() + "_" + coin.symbol,
      symbol: coin.symbol,
      name: coin.name,
      entryPrice: coin.price,
      entryGrade: coin.grade,
      entrySignal: coin.signal,
      amountEur: parseFloat(amountEur),
      tokens: tokens,
      openedAt: new Date().toISOString(),
      status: "open",
    };
    setTrades(prev => [newTrade, ...prev]);
    setTradeModal(null);
  };

  const closeTrade = (tradeId, currentPrice) => {
    setTrades(prev => prev.map(t => t.id === tradeId ? {
      ...t,
      status: "closed",
      exitPrice: currentPrice,
      closedAt: new Date().toISOString(),
      pnlEur: (currentPrice - t.entryPrice) * t.tokens,
      pnlPct: ((currentPrice - t.entryPrice) / t.entryPrice) * 100,
    } : t));
  };

  const deleteTrade = (tradeId) => {
    if (!confirm("Delete this trade record?")) return;
    setTrades(prev => prev.filter(t => t.id !== tradeId));
  };

  // Build a price lookup for live P&L
  const priceMap = {};
  movers.forEach(c => { priceMap[c.symbol] = c.price; });

  // ── AI: Analyze one coin ──────────────────────────────────
  const analyzeOne = async (coin) => {
    setAnalyzing(coin.symbol);
    try {
      const sym = coin.symbol.replace("USDT","");
      const relNews = news.filter(n=>n.title.toLowerCase().includes(sym.toLowerCase())).slice(0,3).map(n=>`- ${n.title} [${n.sentiment}]`).join("\n");

      const prompt = `You are an expert crypto day trader. Analyze this EARLY MOVER coin showing unusual activity.

LIVE DATA (Binance):
- Coin: ${sym} | Price: $${fmt(coin.price)}
- 24h Change: ${coin.change24h.toFixed(2)}%
- Volume Spike: ${coin.volSpike}x normal (${fmtVol(coin.volume24h)} today)
- 24h High: $${fmt(coin.high)} | Low: $${fmt(coin.low)} | Range: ${coin.dayRange}%
- Day Position: ${coin.dayPos}% of day range
- Momentum Score: ${coin.momentum}/100

MARKET CONTEXT:
- Fear & Greed: ${fng?`${fng.value}/100 (${fng.label})`:"N/A"}

RELEVANT NEWS:
${relNews||"No specific news found."}

This coin is showing a ${coin.volSpike}x volume spike. Is this a real breakout or a fake pump?
Give a specific day trade plan. Reply ONLY with valid JSON (no markdown):
{
  "signal": "STRONG_BUY|BUY|HOLD|SELL|STRONG_SELL",

  "confidence": "HIGH|MEDIUM|LOW",
  "timeframe": "how long to hold e.g. 2-6 hours",

}`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "anthropic-dangerous-direct-browser-access":"true" },
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:500, messages:[{role:"user",content:prompt}] })
      });
      if (!res.ok) throw new Error(`API ${res.status}`);

    } catch(e) {
      setMovers(prev=>prev.map(c=>c.symbol===coin.symbol?{...c,prediction:`Failed: ${e.message}`}:c));
    } finally { setAnalyzing(null); }
  };

  // ── AI: Full market scan ─────────────────────────────────
  const analyzeAll = async () => {
    setLoadingGlobal(true);
    try {
      const topSpikes = displayed.slice(0,15).map(c=>
        `${c.symbol.replace("USDT","")}: $${fmt(c.price)}, ${c.change24h.toFixed(1)}%, spike ${c.volSpike}x, vol ${fmtVol(c.volume24h)}`
      ).join("\n");
      const topNews = news.slice(0,6).map(n=>`- ${n.title} [${n.sentiment}]`).join("\n");

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "anthropic-dangerous-direct-browser-access":"true" },
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:800,
          messages:[{ role:"user", content:`You are a senior crypto day trading analyst scanning for early movers.

SCANNED ${totalScanned} BINANCE PAIRS. TOP VOLUME SPIKES RIGHT NOW:
${topSpikes}

FEAR & GREED: ${fng?`${fng.value}/100 — ${fng.label}`:"N/A"}

LATEST NEWS:
${topNews||"No news."}

Which of these are REAL breakouts vs fake pumps? Give today's best day trades.
Reply ONLY with valid JSON (no markdown):
{
  "marketSentiment": "BULLISH|BEARISH|NEUTRAL|VOLATILE",

  "topPicks": [
    {"symbol":"X","reason":"why it's a real move","entry":"price","target":"price","stop":"price"},
    {"symbol":"X","reason":"why it's a real move","entry":"price","target":"price","stop":"price"},
    {"symbol":"X","reason":"why it's a real move","entry":"price","target":"price","stop":"price"}
  ],
  "fakePumps": "coins showing suspicious spike patterns in 12 words",
  "avoidToday": "coins to avoid and why in 12 words",
  "warning": "key risk for day traders today in 10 words",
  "bestWindow": "best trading window today e.g. Next 2-4 hours",
  "newsTheme": "dominant news theme in 8 words"
}` }]
        })
      });
      const data = await res.json();
      const raw = data.content?.find(b=>b.type==="text")?.text||"{}";
      setGlobalPred(JSON.parse(raw.replace(/```json|```/g,"").trim()));
    } catch(e) { console.error(e); }
    finally { setLoadingGlobal(false); }
  };

  // ── Filter & Sort ─────────────────────────────────────────
  const displayed = movers
    .filter(c => {
      if (c.volSpike < minSpike) return false;
      if (Math.abs(c.change24h) < minChange) return false;
      if (filter==="A+") return c.grade === "A+";
      if (filter==="A") return c.grade === "A+" || c.grade === "A";
      if (filter==="B") return c.grade === "B" || c.grade === "A" || c.grade === "A+";
      if (filter==="SPIKE") return c.volSpike >= 3;
      return true;
    })
    .sort((a,b) => {
      // Signal priority — BUY first, then HOLD, then SELL
      const sigOrder = { STRONG_BUY:0, BUY:1, HOLD:2, SELL:3, STRONG_SELL:4 };
      const sigDiff = (sigOrder[a.signal] ?? 2) - (sigOrder[b.signal] ?? 2);

      if (sortBy==="grade")  {
        const gradeDiff = b.gradeScore - a.gradeScore;
        return gradeDiff !== 0 ? gradeDiff : sigDiff;
      }
      if (sortBy==="spike")  {
        const diff = b.volSpike - a.volSpike;
        return diff !== 0 ? diff : sigDiff;
      }
      if (sortBy==="change") {
        const diff = Math.abs(b.change24h) - Math.abs(a.change24h);
        return diff !== 0 ? diff : sigDiff;
      }
      if (sortBy==="volume") {
        const diff = b.volume24h - a.volume24h;
        return diff !== 0 ? diff : sigDiff;
      }
      if (sortBy==="signal") { const o={STRONG_BUY:0,BUY:1,HOLD:2,SELL:3,STRONG_SELL:4}; return (o[a.signal]??2)-(o[b.signal]??2); }
      return 0;

    .slice(0, 60); // show top 60

  const stats = {

  const sentCol = {BULLISH:"#00ff88",BEARISH:"#f87171",NEUTRAL:"#facc15",VOLATILE:"#fb923c"};
  const fngColor = fng?(fng.value>=60?"#00ff88":fng.value>=40?"#facc15":"#f87171"):"#334155";

              const openTrades = trades.filter(t=>t.status==="open");
              const closedTrades = trades.filter(t=>t.status==="closed");
              const openWithLive = openTrades.map(t => {
                const livePrice = priceMap[t.symbol] || t.entryPrice;
                const pct = ((livePrice - t.entryPrice) / t.entryPrice) * 100;
                const eur = (livePrice - t.entryPrice) * t.tokens;
                return { ...t, livePrice, livePct: pct, liveEur: eur };
              });
              const totalInvested = openTrades.reduce((s,t)=>s+t.amountEur, 0);
              const totalPnlEur = openWithLive.reduce((s,t)=>s+t.liveEur, 0);
              const totalPnlPct = totalInvested > 0 ? (totalPnlEur/totalInvested)*100 : 0;
              const closedPnl = closedTrades.reduce((s,t)=>s+(t.pnlEur||0), 0);
              const wins = closedTrades.filter(t=>(t.pnlEur||0) > 0).length;
              const winRate = closedTrades.length > 0 ? (wins/closedTrades.length*100).toFixed(0) : 0;

                      <div style={{ fontSize:10, color:totalPnlEur>=0?"#00ff88":"#f87171", marginTop:2, fontFamily:"'Space Mono',monospace" }}>

                      <div style={{ fontFamily:"'Space Mono',monospace", fontSize:20, fontWeight:700, color:closedPnl>=0?"#00ff88":closedPnl<0?"#f87171":"#e2e8f0" }}>

                      </div>
                      <div style={{ fontSize:10, color:"#475569", marginTop:2 }}>{closedTrades.length} closed</div>
                    </div>
                    <div style={{ background:"rgba(255,255,255,0.02)", border:"1px solid #1a2535", borderRadius:12, padding:"12px 16px" }}>
                      <div style={{ fontSize:9, color:"#475569", letterSpacing:1.5, fontFamily:"'Space Mono',monospace", marginBottom:4 }}>WIN RATE</div>
                      <div style={{ fontFamily:"'Space Mono',monospace", fontSize:20, fontWeight:700, color:"#facc15" }}>{winRate}%</div>
                      <div style={{ fontSize:10, color:"#475569", marginTop:2 }}>{wins} of {closedTrades.length}</div>
                    </div>
                  </div>

                  {/* Open trades */}
                  {openWithLive.length > 0 && (
                    <>
                      <div style={{ fontSize:10, color:"#00ff88", fontFamily:"'Space Mono',monospace", letterSpacing:1.5, marginBottom:10 }}>● OPEN TRADES</div>
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))", gap:12, marginBottom:24 }}>
                        {openWithLive.map(t => {
                          const pnlCol = t.livePct >= 0 ? "#00ff88" : "#f87171";
                          const mins = Math.floor((Date.now() - new Date(t.openedAt))/60000);
                          const dur = mins < 60 ? `${mins}m` : `${Math.floor(mins/60)}h ${mins%60}m`;
                          return (
                            <div key={t.id} style={{ background:"rgba(10,14,26,0.97)", border:`1px solid ${pnlCol}30`, borderRadius:12, padding:14 }}>

                                <div>
                                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                                    <span style={{ fontFamily:"'Space Mono',monospace", fontSize:14, fontWeight:700, color:"#e2e8f0" }}>{t.symbol.replace("USDT","")}</span>
                                    <span style={{ fontSize:9, color:"#475569", fontFamily:"'Space Mono',monospace" }}>· {dur} ago</span>
                                  </div>
                                  <div style={{ fontSize:10, color:"#64748b", marginTop:2 }}>{t.tokens.toFixed(t.entryPrice>1?4:2)} tokens · entered ${fmt(t.entryPrice)}</div>
                                </div>
                                <div style={{ textAlign:"right" }}>
                                  <div style={{ fontSize:13, fontFamily:"'Space Mono',monospace", color:pnlCol, fontWeight:700 }}>{t.livePct>=0?"+":""}{t.livePct.toFixed(2)}%</div>
                                  <div style={{ fontSize:11, fontFamily:"'Space Mono',monospace", color:pnlCol }}>{t.liveEur>=0?"+":""}€{t.liveEur.toFixed(2)}</div>
                                </div>
                              </div>
                              <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#475569", fontFamily:"'Space Mono',monospace", marginBottom:10 }}>

                                <span>Now worth: €{(t.amountEur + t.liveEur).toFixed(2)}</span>
                              </div>
                              <button onClick={()=>closeTrade(t.id, t.livePrice)} style={{ width:"100%", padding:"6px", borderRadius:6, background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.3)", color:"#f87171", fontSize:10, fontWeight:700, cursor:"pointer", fontFamily:"'Space Mono',monospace", letterSpacing:1.5 }}>
                                ✕ CLOSE TRADE
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}

                  {/* Closed trades */}
                  {closedTrades.length > 0 && (
                    <>
                      <div style={{ fontSize:10, color:"#475569", fontFamily:"'Space Mono',monospace", letterSpacing:1.5, marginBottom:10 }}>○ HISTORY ({closedTrades.length})</div>

                              <div style={{ color:"#94a3b8" }}>${fmt(t.entryPrice)}</div>
                              <div style={{ color:"#94a3b8" }}>${fmt(t.exitPrice)}</div>
                              <div style={{ color:col, fontWeight:700 }}>{(t.pnlEur||0)>=0?"+":""}€{(t.pnlEur||0).toFixed(2)}</div>
                              <div style={{ color:col, fontWeight:700 }}>{(t.pnlPct||0)>=0?"+":""}{(t.pnlPct||0).toFixed(2)}%</div>
                              <button onClick={()=>deleteTrade(t.id)} style={{ background:"transparent", border:"none", color:"#475569", cursor:"pointer", fontSize:14 }}>×</button>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}

                  {trades.length === 0 && (
                    <div style={{ textAlign:"center", padding:"60px 20px", color:"#1e2535" }}>
                      <div style={{ fontSize:36, marginBottom:12 }}>💼</div>
                      <div style={{ fontFamily:"'Space Mono',monospace", letterSpacing:2, fontSize:11, color:"#475569", marginBottom:6 }}>NO TRADES YET</div>
                      <div style={{ fontSize:11, color:"#334155" }}>Click "BUY THIS" on any coin in Early Movers to start paper trading</div>
                    </div>
                  )}
                </>
              );
            })()}
          </div>
        )}

        {/* ── NEWS TAB ── */}
        {tab==="news" && (
          <div style={{ maxWidth:700 }}>
            {news.length===0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px", color:"#334155" }}>
                <div style={{ fontSize:28, marginBottom:8 }}>📰</div>
                <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, letterSpacing:1 }}>NEWS LOADS ON GITHUB PAGES</div>
              </div>
            ) : (
              <>
                <div style={{ fontSize:9, color:"#334155", fontFamily:"'Space Mono',monospace", letterSpacing:1.5, marginBottom:12 }}>LATEST NEWS · {news.length} ARTICLES · USED IN AI ANALYSIS</div>
                {news.map((n,i)=><NewsItem key={i} item={n}/>)}
              </>
            )}
          </div>
        )}

        <div style={{ textAlign:"center", marginTop:40, padding:"14px 0", borderTop:"1px solid #0a1020" }}>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:8, color:"#0f1628", letterSpacing:3 }}>
            CRYPTEX EARLY MOVER · BINANCE {totalScanned} PAIRS · FEAR&GREED · NEWS · AI POWERED · NOT FINANCIAL ADVICE
          </div>
        </div>
      </div>
    </div>
  );
}


    // Mount app
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(<CryptoAdvisor />);
    document.getElementById("loading").style.display = "none";
  </script>
</body>
</html>
